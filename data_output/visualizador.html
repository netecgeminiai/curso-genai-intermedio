<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Visualizador de Exámenes - Exam Creator</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <style>
        :root { --bg: #0d1117; --card: #161b22; --text: #c9d1d9; --accent: #58a6ff; --correct: #3fb950; --border: #30363d; }
        body { font-family: -apple-system, sans-serif; background-color: var(--bg); color: var(--text); padding: 40px; margin: 0; }
        h1 { color: var(--accent); border-bottom: 2px solid var(--border); padding-bottom: 10px; }
        .question-card { background: var(--card); border: 1px solid var(--border); border-radius: 8px; padding: 20px; margin-bottom: 20px; }
        .q-header { display: flex; justify-content: space-between; color: #8b949e; font-size: 0.9em; margin-bottom: 15px; border-bottom: 1px solid var(--border); padding-bottom: 10px; }
        .q-text { font-size: 1.2em; margin-bottom: 20px; font-weight: 500; }
        .option { padding: 10px 15px; margin: 8px 0; background: #21262d; border-radius: 6px; border: 1px solid var(--border); }
        .option.correct { border-left: 4px solid var(--correct); background: rgba(63, 185, 80, 0.1); }
        .q-footer { margin-top: 15px; padding-top: 15px; border-top: 1px dashed var(--border); font-size: 0.9em; color: #8b949e; }
        .tag { background: #1f6feb; color: white; padding: 3px 8px; border-radius: 12px; font-size: 0.8em; }
    </style>
</head>
<body>
    <h1>📝 Visualizador de Exámenes (Exam Creator)</h1>
    <p>Archivo cargado: <b>Examen_PreConocimiento_FullStack.csv</b></p>
    <div id="exam-container">Cargando preguntas...</div>

    <script>
        Papa.parse("Examen_PreConocimiento_FullStack.csv", {
            download: true,
            header: true,
            complete: function(results) {
                const container = document.getElementById('exam-container');
                container.innerHTML = '';
                
                results.data.forEach(row => {
                    if(!row["PREGUNTA"]) return;
                    
                    const ansMap = { 'A': row["OPCIÓN A"], 'B': row["OPCIÓN B"], 'C': row["OPCIÓN C"], 'D': row["OPCIÓN D"] };
                    const correctLetter = row["RESPUESTA CORRECTA"];
                    
                    let html = `
                    <div class="question-card">
                        <div class="q-header">
                            <span>Pregunta ${row["No. De pregunta"]} | Nivel Bloom: ${row["BLOOM"]}</span>
                            <span class="tag">${row["Modulo/Capitulo (Tags)"]}</span>
                        </div>
                        <div class="q-text">${row["PREGUNTA"]}</div>
                        <div class="options">
                    `;
                    
                    ['A', 'B', 'C', 'D'].forEach(letter => {
                        if(ansMap[letter]) {
                            const isCorrect = letter === correctLetter ? 'correct' : '';
                            html += `<div class="option ${isCorrect}"><b>${letter})</b> ${ansMap[letter]}</div>`;
                        }
                    });
                    
                    html += `
                        </div>
                        <div class="q-footer">💡 <b>Justificación:</b> ${row["FRAGMENTO"]}</div>
                    </div>`;
                    
                    container.innerHTML += html;
                });
            }
        });
    </script>
</body>
</html>
